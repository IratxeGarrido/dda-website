<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ’s | Blind Duck Dating</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css" />
  <script src="/components/header.js" defer></script>
  <script src="/components/footer.js" defer></script>
</head>
<body data-page="faq">

  <duck-header></duck-header>

  <!-- SEARCH BAR -->
  <div class="mb-10">
    <div class="max-w-5xl mx-auto px-6" style="padding-top: 20px;">
      <div class="bg-white rounded-[2rem] border border-black/10 shadow-sm p-4 md:p-5">
        <label for="faq-search" class="block text-sm font-black uppercase tracking-[0.16em] text-[#ff5b92] mb-3">
          Search FAQ
        </label>
        <input
          id="faq-search"
          type="text"
          placeholder="Search questions, topics, events..."
          class="w-full rounded-2xl border border-black/10 bg-[#f8f4ee] px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-[#ff8b4e]"
        />
      </div>
    </div>
  </div>

  <!-- FAQ LIST -->
  <section class="pb-20">
    <div id="faq-container" class="max-w-5xl mx-auto px-6"></div>
  </section>

  <script>
    const FAQ_SECTIONS = {
      general: {
        title: "General",
        pillClass: "bg-[#2f2f2f] text-white",
        cardClass: "bg-[#f5f5f5]"
      },
      dda: {
        title: "Blind Duck Dating",
        pillClass: "bg-[#ff5b92] text-white",
        cardClass: "bg-[#fff1f6]"
      },
      psd: {
        title: "Poly Speed Dating",
        pillClass: "bg-[#ffd36e] text-[#2f2f2f]",
        cardClass: "bg-[#fff8dd]"
      },
      polyfest: {
        title: "PolyFest",
        pillClass: "bg-[#8fd3c7] text-[#2f2f2f]",
        cardClass: "bg-[#eefaf6]"
      }
    };

    function createFaqItem(item, cardClass) {
      const faqItem = document.createElement("div");
      faqItem.setAttribute("data-faq-item", "");
      faqItem.className = `${cardClass} rounded-[1.75rem] border border-black/10 p-6 md:p-8 shadow-sm`;

      const question = document.createElement("h2");
      question.className = "text-2xl font-black";
      question.textContent = item.question;

      const answer = document.createElement("p");
      answer.className = "mt-3 text-lg text-black/70";
      answer.textContent = item.answer;

      faqItem.appendChild(question);
      faqItem.appendChild(answer);

      if (item.link && item.linkText) {
        const link = document.createElement("a");
        link.href = item.link;
        link.className = "mt-4 inline-block font-bold underline underline-offset-4";
        link.textContent = item.linkText;
        faqItem.appendChild(link);
      }

      return faqItem;
    }

    function createChevron(isOpen = false) {
      const chevron = document.createElement("span");
      chevron.className = "ml-auto text-lg transition-transform duration-200";
      chevron.innerHTML = "⌄";
      if (isOpen) chevron.style.transform = "rotate(180deg)";
      return chevron;
    }

    function createFaqSection(sectionKey, items, isOpenByDefault = false) {
      const config = FAQ_SECTIONS[sectionKey];
      if (!config || !Array.isArray(items) || items.length === 0) return null;

      const section = document.createElement("div");
      section.className = "mb-14";
      section.setAttribute("data-faq-section", "");

      const title = document.createElement("button");
      title.type = "button";
      title.className = `flex items-center gap-2 rounded-full px-5 text-sm font-black uppercase tracking-[0.16em] mb-6 w-full text-left ${config.pillClass}`;
      title.style.paddingTop = "calc(0.8rem * 1.3)";
      title.style.paddingBottom = "calc(0.8rem * 1.3)";
      title.setAttribute("data-faq-toggle", "");
      title.setAttribute("aria-expanded", isOpenByDefault ? "true" : "false");

      const titleText = document.createElement("span");
      titleText.textContent = config.title;

      const chevron = createChevron(isOpenByDefault);
      chevron.setAttribute("data-faq-chevron", "");

      title.appendChild(titleText);
      title.appendChild(chevron);

      const list = document.createElement("div");
      list.className = "space-y-5";
      list.setAttribute("data-faq-content", "");
      list.style.display = isOpenByDefault ? "" : "none";

      items.forEach((item) => {
        list.appendChild(createFaqItem(item, config.cardClass));
      });

      title.addEventListener("click", () => {
        const isOpen = list.style.display !== "none";
        list.style.display = isOpen ? "none" : "";
        title.setAttribute("aria-expanded", isOpen ? "false" : "true");
        chevron.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
      });

      section.appendChild(title);
      section.appendChild(list);

      return section;
    }

    async function loadFaqs() {
      const faqContainer = document.getElementById("faq-container");
      const searchInput = document.getElementById("faq-search");

      if (!faqContainer) return;

      try {
        const response = await fetch("/data/faq.json");
        if (!response.ok) {
          throw new Error("Could not load FAQ JSON");
        }

        const faqData = await response.json();

        const sectionOrder = ["general", "dda", "psd", "polyfest"];

        sectionOrder.forEach((sectionKey, index) => {
          const section = createFaqSection(sectionKey, faqData[sectionKey], index === 0);
          if (section) faqContainer.appendChild(section);
        });

        const sections = document.querySelectorAll("[data-faq-section]");

        if (!searchInput) return;

        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase().trim();

          sections.forEach((section) => {
            const items = section.querySelectorAll("[data-faq-item]");
            const content = section.querySelector("[data-faq-content]");
            const toggle = section.querySelector("[data-faq-toggle]");
            const chevron = section.querySelector("[data-faq-chevron]");
            let visibleCount = 0;

            items.forEach((item) => {
              const text = item.textContent.toLowerCase();
              const matches = text.includes(query);

              item.style.display = matches ? "" : "none";
              if (matches) visibleCount++;
            });

            if (visibleCount > 0) {
              section.style.display = "";
              if (query !== "") {
                content.style.display = "";
                toggle.setAttribute("aria-expanded", "true");
                chevron.style.transform = "rotate(180deg)";
              }
            } else {
              section.style.display = "none";
            }

            if (query === "") {
              const isExpanded = toggle.getAttribute("aria-expanded") === "true";
              content.style.display = isExpanded ? "" : "none";
              chevron.style.transform = isExpanded ? "rotate(180deg)" : "rotate(0deg)";
              section.style.display = "";
            }
          });
        });

      } catch (error) {
        faqContainer.innerHTML = `
          <div class="bg-white rounded-[1.75rem] border border-red-200 p-6 shadow-sm">
            <h2 class="text-2xl font-black text-red-700">Could not load FAQ</h2>
            <p class="mt-3 text-lg text-red-600/80">
              Please check that <code>/data/faq.json</code> exists and contains valid JSON.
            </p>
          </div>
        `;
        console.error(error);
      }
    }

    document.addEventListener("DOMContentLoaded", loadFaqs);
  </script>

  <duck-footer></duck-footer>

</body>
</html>
