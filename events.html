<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dating Events Berlin | Blind Duck Dating</title>
  <meta name="description" content="Discover Blind Duck Dating events in Berlin. Explore inclusive in-person dating events, blind dating nights, and ways to meet people offline." />
  <link rel="canonical" href="https://www.duckdatingapps.com/events.html" />

  <meta property="og:title" content="Dating Events Berlin | Blind Duck Dating" />
  <meta property="og:description" content="Explore blind dating and in-person people events in Berlin with Blind Duck Dating." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.duckdatingapps.com/events.html" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css" />
  <script src="/components/header.js" defer></script>
  <script src="/components/footer.js" defer></script>
  <script src="/js/events-data.js"></script>
</head>

<body data-page="events">

  <duck-header></duck-header>

  <!-- HERO -->
  <section class="relative overflow-hidden">
    <div class="absolute inset-0 grid-bg opacity-40 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto px-6 pt-16 pb-12 md:pt-20 md:pb-14 relative text-center">
      <h1 class="text-5xl md:text-7xl font-black tracking-tight leading-[0.95]">
        Try a new way to meet people
      </h1>
    </div>
  </section>

  <!-- CONTENT -->
  <main class="pb-20 px-4">
    <div class="max-w-6xl mx-auto">

      <!-- EVENT LIST -->
      <section class="mb-10">
        <div id="dda-event-list" class="dda-event-list-grid"></div>
      </section>

      <!-- CALENDAR -->
      <section>
        <div class="inline-flex items-center gap-2 bg-white border border-black/10 rounded-full px-4 py-2 text-sm font-bold sticker mb-6">
          <span class="w-2.5 h-2.5 rounded-full bg-pink-500"></span>
          EVENT CALENDAR
        </div>

        <div id="dda-calendar"></div>
      </section>

    </div>
  </main>

  <duck-footer></duck-footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Blind Duck Dating Events in Berlin",
    "url": "https://www.duckdatingapps.com/events.html",
    "description": "Browse Blind Duck Dating events in Berlin, including blind dating events and in-person singles events.",
    "about": {
      "@type": "Organization",
      "name": "Blind Duck Dating",
      "url": "https://www.duckdatingapps.com/"
    }
  }
  </script>

  <script>
    (function () {
      const RAW_EVENTS = Array.isArray(window.DDA_EVENTS) ? window.DDA_EVENTS : [];

      const EXTRA_CALENDAR_EVENTS = [
        {
          date: "2026-05-20",
          slug: "poly-speed-dating-june-2026",
          name: "PSD Deadline",
          shortName: "PSD Deadline",
          dateText: "20 May 2026",
          location: "Berlin, near Treptower Park",
          frequency: "Every few months",
          shortDescription: "Application deadline for Poly Speed Dating Berlin.",
          applicationUrl: "https://poly-speed-dating.onrender.com/",
          externalUrl: "https://poly-speed-dating.onrender.com/",
          cardBg: "#ffd36e",
          deadlineText: "Application deadline: 20 May 2026",
          html: `
            <h3 class="dda-event-detail-title">PSD Deadline</h3>
            <p>Application deadline for Poly Speed Dating Berlin.</p>
            <p class="dda-event-detail-deadline">Application deadline: 20 May 2026</p>
          `
        }
      ];

      const MONTHS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];

      const WEEKDAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function ymd(d) {
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      }

      function startOfMonth(date) {
        return new Date(date.getFullYear(), date.getMonth(), 1);
      }

      function endOfMonth(date) {
        return new Date(date.getFullYear(), date.getMonth() + 1, 0);
      }

      function mondayFirstDayIndex(jsDay) {
        return (jsDay + 6) % 7;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      const EVENTS = Object.fromEntries([
        ...RAW_EVENTS.map(event => [
          event.date,
          {
            slug: event.slug,
            name: event.name,
            dateText: event.dateText,
            label: event.shortName || event.name,
            location: event.location,
            frequency: event.frequency,
            shortDescription: event.shortDescription,
            applicationUrl: event.applicationUrl,
            externalUrl: event.externalUrl,
            cardBg: event.cardBg,
            deadlineText: event.deadlineText,
            html: `
              <h3 class="dda-event-detail-title">${escapeHtml(event.name)}</h3>
              <p>${escapeHtml(event.shortDescription || "")}</p>
              ${event.deadlineText ? `<p class="dda-event-detail-deadline">${escapeHtml(event.deadlineText)}</p>` : ""}
            `
          }
        ]),
        ...EXTRA_CALENDAR_EVENTS.map(event => [
          event.date,
          {
            slug: event.slug,
            name: event.name,
            dateText: event.dateText,
            label: event.shortName || event.name,
            location: event.location,
            frequency: event.frequency,
            shortDescription: event.shortDescription,
            applicationUrl: event.applicationUrl,
            externalUrl: event.externalUrl,
            cardBg: event.cardBg,
            deadlineText: event.deadlineText,
            html: event.html
          }
        ])
      ]);

      function getInitialCalendarDate() {
        const allDates = [
          ...RAW_EVENTS.map(event => event.date),
          ...EXTRA_CALENDAR_EVENTS.map(event => event.date)
        ].sort((a, b) => a.localeCompare(b));

        if (!allDates.length) return new Date();

        const first = allDates[0];
        const parts = first.split("-").map(Number);

        if (parts.length !== 3) return new Date();

        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function renderEventList() {
        const listEl = document.getElementById("dda-event-list");
        if (!listEl) return;

        const events = [...RAW_EVENTS].sort((a, b) => a.date.localeCompare(b.date));

        if (!events.length) {
          listEl.innerHTML = `
            <div class="dda-event-empty">
              <p>No upcoming events in Berlin yet.</p>
            </div>
          `;
          return;
        }

        listEl.innerHTML = events.map(event => `
          <a
            href="./event.html?slug=${encodeURIComponent(event.slug)}"
            class="dda-event-card relative"
            style="background:${event.cardBg || "#ffffff"};"
          >
            <img
              src="${event.logo}"
              alt="${escapeHtml(event.logoAlt || event.name)}"
              class="dda-event-card-logo"
            />

            ${event.badge ? `
              <div class="dda-event-card-badge">
                ${escapeHtml(event.badge)}
              </div>
            ` : ""}

            <div class="dda-event-card-inner">
              <p class="dda-event-card-meta">
                📍 ${escapeHtml(event.location || "Berlin")}
                ${event.frequency ? `&nbsp;&nbsp;|&nbsp;&nbsp; ⏲ ${escapeHtml(event.frequency)}` : ""}
              </p>

              <h3 class="dda-event-card-title">${escapeHtml(event.name)}</h3>

              <p class="dda-event-card-text">${escapeHtml(event.shortDescription || "")}</p>

              <div class="dda-event-card-bottom">
                <span class="dda-event-card-link">Open event page</span>
                <span class="dda-event-card-date">${escapeHtml(event.dateText || event.date)}</span>
              </div>
            </div>
            ${event.slug === "blind-duck-dating-registry-deadline-april-2026" ? `
  <div
    class="absolute bottom-4 right-4 bg-[#ffd36e] text-[#2f2f2f] px-4 py-2 rounded-full font-black text-[11px] md:text-sm border border-black/10 shadow-md text-center leading-tight"
    style="transform: rotate(-8deg);"
  >
    Flock of registered Ducklings:
    <span id="pool-count">...</span>
  </div>
` : ""}
          </a>
        `).join("");
      }

      function createCalendar(container) {
        const state = {
          current: getInitialCalendarDate(),
          selected: null
        };

        container.innerHTML = `
          <div class="dda-cal-card">
            <div class="dda-cal-header">
              <div class="dda-cal-title" id="dda-cal-title"></div>

              <div class="dda-cal-actions">
                <button class="dda-cal-btn" id="dda-cal-prev" type="button">← Prev</button>
                <button class="dda-cal-btn" id="dda-cal-today" type="button">Today</button>
                <button class="dda-cal-btn" id="dda-cal-next" type="button">Next →</button>
              </div>
            </div>

            <div class="dda-cal-body">
              <div class="dda-cal-grid dda-cal-grid-weekdays" id="dda-cal-weekdays"></div>
              <div class="dda-cal-grid dda-cal-grid-days" id="dda-cal-days"></div>
              <div class="dda-cal-footer" id="dda-cal-footer">Click a day to select it.</div>
            </div>
          </div>
        `;

        const elTitle = container.querySelector("#dda-cal-title");
        const elWeekdays = container.querySelector("#dda-cal-weekdays");
        const elDays = container.querySelector("#dda-cal-days");
        const elFooter = container.querySelector("#dda-cal-footer");

        const btnPrev = container.querySelector("#dda-cal-prev");
        const btnNext = container.querySelector("#dda-cal-next");
        const btnToday = container.querySelector("#dda-cal-today");

        elWeekdays.innerHTML = WEEKDAYS.map(day => `
          <div class="dda-cal-weekday">${day}</div>
        `).join("");

        function render() {
          const viewDate = state.current;
          const monthStart = startOfMonth(viewDate);
          const monthEnd = endOfMonth(viewDate);

          elTitle.textContent = `${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

          const lead = mondayFirstDayIndex(monthStart.getDay());
          const daysInMonth = monthEnd.getDate();

          const cells = [];

          for (let i = 0; i < lead; i++) {
            cells.push({ type: "blank" });
          }

          for (let day = 1; day <= daysInMonth; day++) {
            cells.push({
              type: "day",
              date: new Date(viewDate.getFullYear(), viewDate.getMonth(), day)
            });
          }

          const trail = (7 - (cells.length % 7)) % 7;
          for (let i = 0; i < trail; i++) {
            cells.push({ type: "blank" });
          }

          const todayKey = ymd(new Date());

          elDays.innerHTML = cells.map(cell => {
            if (cell.type === "blank") {
              return `<div class="dda-cal-cell dda-cal-cell--blank"></div>`;
            }

            const key = ymd(cell.date);
            const isToday = key === todayKey;
            const isSelected = state.selected && ymd(state.selected) === key;
            const ev = EVENTS[key];

            const cls = [
              "dda-cal-cell",
              isToday ? "dda-cal-cell--today" : "",
              isSelected ? "dda-cal-cell--selected" : "",
              ev ? "dda-cal-cell--has-event" : ""
            ].filter(Boolean).join(" ");

            const badge = ev
              ? `<div class="dda-event-badge">${escapeHtml(ev.name)}</div>`
              : "";

            const style = ev ? `style="background:${escapeHtml(ev.cardBg || "#ffd36e")};"` : "";

            return `
              <button class="${cls}" type="button" data-date="${key}" ${style}>
                <div class="dda-cal-daynum">${cell.date.getDate()}</div>
                ${badge}
              </button>
            `;
          }).join("");

          if (state.selected) {
            const key = ymd(state.selected);

            if (EVENTS[key]) {
              elFooter.innerHTML = `
                <div class="dda-event-detail">
                  ${EVENTS[key].html}
                  <div class="dda-event-detail-actions">
                    <a
                      href="./event.html?slug=${encodeURIComponent(EVENTS[key].slug)}"
                      class="dda-event-detail-link"
                    >
                      Open full event page
                    </a>
                  </div>
                </div>
              `;
            } else {
              elFooter.textContent = "Selected: " + ymd(state.selected);
            }
          } else {
            elFooter.textContent = "Click a day to select it.";
          }
        }

        btnPrev.addEventListener("click", function () {
          state.current = new Date(state.current.getFullYear(), state.current.getMonth() - 1, 1);
          render();
        });

        btnNext.addEventListener("click", function () {
          state.current = new Date(state.current.getFullYear(), state.current.getMonth() + 1, 1);
          render();
        });

        btnToday.addEventListener("click", function () {
          state.current = new Date();
          state.selected = null;
          render();
        });

        container.addEventListener("click", function (e) {
          const btn = e.target.closest("button[data-date]");
          if (!btn) return;

          const parts = btn.dataset.date.split("-").map(Number);
          state.selected = new Date(parts[0], parts[1] - 1, parts[2]);
          render();
        });

        render();
      }

      function initEventsPage() {
        renderEventList();

        const mount = document.getElementById("dda-calendar");
        if (!mount) {
          console.warn("Calendar mount #dda-calendar not found.");
          return;
        }

        createCalendar(mount);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initEventsPage);
      } else {
        initEventsPage();
      }
    })();
  </script>

  <script src="/js/pool-count.js"></script>

</body>
</html>
